<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Where is it? — Direction Duel</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --grass:#abd87f; --grass-2:#9bcf6c; --road:#e8d9b0; --road-line:#d8c48c;
    --pink:#ff79a8; --pink-d:#e4548a; --sun:#ffd64d; --sun-d:#e9b400; --ink:#3a3340;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ font-family:'Fredoka','Jua',sans-serif; margin:0; color:var(--ink);
        background:#f3efe6; overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  .kr{ font-family:'Jua',sans-serif; }

  /* ---------- Layout: 3 columns ---------- */
  #stage{ display:flex; flex-direction:row; height:100dvh; width:100vw; }
  .rail{ flex:0 0 21%; min-width:0; display:flex; flex-direction:column; padding:10px 10px; position:relative; }
  #rail-A{ background:linear-gradient(180deg,#ffe9f1,#ffd7e6); border-right:3px solid #ffb6cf; }
  #rail-B{ background:linear-gradient(180deg,#fff8e0,#fff0c2); border-left:3px solid #f3dd8a; }
  #map-wrap{ flex:1 1 auto; min-width:0; display:flex; flex-direction:column; padding:10px 6px;
             background:radial-gradient(circle at 50% 0%, #fbf7ee, #efe7d6); }

  /* ---------- Banner ---------- */
  #banner{ flex:0 0 auto; text-align:center; font-family:'Jua',sans-serif; }
  #banner .big{ font-size:1.5rem; color:#3a3340; }
  #banner .big b{ color:var(--sun-d); }
  #banner .small{ font-size:.85rem; color:#9a8f7d; margin-top:-2px; }
  #btn-speak{ font-size:1.1rem; line-height:1; width:38px; height:38px; border-radius:50%; cursor:pointer;
              background:#fff; border:2px solid #f0e8d6; box-shadow:0 2px 5px rgba(0,0,0,.14); vertical-align:middle; margin-left:8px; }
  #btn-speak:active{ transform:scale(.92); }

  /* ---------- Board ---------- */
  #holder{ flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center; padding:6px 0; }
  .board{ width:100%; aspect-ratio:4/3; max-height:100%; position:relative; border-radius:22px; overflow:hidden;
    background:
      radial-gradient(circle at 22% 30%, rgba(255,255,255,.18), transparent 40%),
      repeating-linear-gradient(45deg, var(--grass) 0 22px, var(--grass-2) 22px 44px);
    border:6px solid #7fb755;
    box-shadow:inset 0 0 0 4px rgba(255,255,255,.25), inset 0 0 40px rgba(0,0,0,.10), 0 10px 26px rgba(0,0,0,.14); }
  .h-road,.v-road{ position:absolute; background:var(--road); }
  .h-road{ left:3%; width:94%; height:26px; }
  .v-road{ top:3%; height:94%; width:26px; }
  .h-road::after{ content:""; position:absolute; top:50%; left:0; right:0; border-top:3px dashed var(--road-line); transform:translateY(-50%); }
  .v-road::after{ content:""; position:absolute; left:50%; top:0; bottom:0; border-left:3px dashed var(--road-line); transform:translateX(-50%); }

  .building{ position:absolute; z-index:10; display:flex; flex-direction:column; align-items:center;
             transform:translate(-50%,-60%); pointer-events:none; }
  .building .ico{ font-size:3.3rem; line-height:1; filter:drop-shadow(0 4px 3px rgba(0,0,0,.18)); }
  .building .tag{ margin-top:3px; background:#fff; border:2px solid #efe7d4; color:#5a5360;
                  font-size:13px; font-weight:600; padding:2px 10px; border-radius:999px; white-space:nowrap;
                  box-shadow:0 2px 4px rgba(0,0,0,.10); font-family:'Fredoka',sans-serif; }
  .building.is-target .tag{ background:var(--sun); border-color:var(--sun-d); color:#5a4500; }
  .building.is-target .ico{ filter:drop-shadow(0 0 10px rgba(255,200,0,.9)); }

  .scenery{ position:absolute; z-index:5; transform:translate(-50%,-50%); pointer-events:none;
            filter:drop-shadow(0 3px 2px rgba(0,0,0,.12)); }

  #pin{ position:absolute; z-index:22; font-size:3.2rem; transform:translate(-50%,-120%);
        filter:drop-shadow(0 6px 5px rgba(0,0,0,.3)); animation:bob 1s ease-in-out infinite; display:none; }
  @keyframes bob{ 0%,100%{ transform:translate(-50%,-120%);} 50%{ transform:translate(-50%,-148%);} }

  .char{ position:absolute; z-index:30; width:58px; height:58px; border-radius:50%;
         display:flex; align-items:center; justify-content:center; font-size:1.9rem;
         box-shadow:0 5px 0 rgba(0,0,0,.12), 0 6px 10px rgba(0,0,0,.22);
         transition:left .45s cubic-bezier(.34,1.2,.5,1), top .45s cubic-bezier(.34,1.2,.5,1), transform .35s ease; }
  #char-A{ background:radial-gradient(circle at 35% 30%, #ffd0e2, var(--pink)); border:4px solid #fff; }
  #char-B{ background:radial-gradient(circle at 35% 30%, #fff0b3, var(--sun)); border:4px solid #fff; }
  .char .arrow{ position:absolute; top:-16px; width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; }
  #char-A .arrow{ border-bottom:18px solid var(--pink-d); }
  #char-B .arrow{ border-bottom:18px solid var(--sun-d); }
  @keyframes pop{ 0%{transform:scale(1);} 50%{transform:scale(1.4);} 100%{transform:scale(1);} }
  .pop{ animation:pop .5s ease; }

  #toast{ position:absolute; z-index:55; left:50%; top:50%; transform:translate(-50%,-50%) scale(.8);
          background:rgba(58,51,64,.92); color:#fff; font-family:'Jua',sans-serif; font-size:1.2rem;
          padding:12px 24px; border-radius:18px; opacity:0; transition:all .3s; pointer-events:none; text-align:center; white-space:pre-line; }
  #toast.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }

  /* ---------- Hub (bottom center) ---------- */
  #hub{ flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:14px; padding-top:6px; }
  .score{ display:flex; align-items:center; gap:6px; font-size:1.6rem; font-weight:700; font-family:'Jua',sans-serif; }
  .dot{ width:16px; height:16px; border-radius:50%; box-shadow:0 2px 4px rgba(0,0,0,.2); }
  .dot.A{ background:var(--pink); } .dot.B{ background:var(--sun); }
  #go-block{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  #round-badge{ font-size:.72rem; color:#8a8290; font-weight:600; letter-spacing:.5px; }
  #btn-go{ width:72px; height:72px; border-radius:50%; border:5px solid #fff; color:#fff;
           font-family:'Jua',sans-serif; font-size:1.5rem; cursor:pointer;
           background:radial-gradient(circle at 35% 30%, #ff8a8a, #d63b3b);
           box-shadow:0 8px 0 #a82a2a, 0 12px 18px rgba(0,0,0,.3); transition:all .12s; }
  #btn-go:not(:disabled):active{ transform:translateY(4px); box-shadow:0 4px 0 #a82a2a; }
  #btn-go:disabled{ background:#cfcad4; box-shadow:0 8px 0 #b3aebb; cursor:not-allowed; }
  #btn-go.glow{ animation:glow 1s ease-in-out infinite; }
  @keyframes glow{ 0%,100%{ box-shadow:0 8px 0 #a82a2a, 0 0 0 rgba(255,80,80,.6);} 50%{ box-shadow:0 8px 0 #a82a2a, 0 0 22px 6px rgba(255,80,80,.85);} }
  .mini-btn{ font-family:'Jua',sans-serif; font-size:1rem; font-weight:600; padding:11px 20px;
             border-radius:16px; border:2px solid #e5dfd2; background:#fff; color:#7a7280; cursor:pointer;
             box-shadow:0 3px 0 #d9d2c4; transition:all .12s; }
  .mini-btn:active{ transform:translateY(2px); box-shadow:none; }
  #side-btns{ display:flex; flex-direction:column; gap:8px; }
  /* Next button blinks red when results are in */
  #btn-next.blink{ color:#fff; border-color:#ff3b3b; box-shadow:0 3px 0 #b62525;
                   animation:nextblink .7s ease-in-out infinite; }
  @keyframes nextblink{
    0%,100%{ background:#ff5a5a; box-shadow:0 3px 0 #b62525, 0 0 0 rgba(255,70,70,0); transform:scale(1); }
    50%{ background:#ff2f2f; box-shadow:0 3px 0 #b62525, 0 0 20px 5px rgba(255,60,60,.9); transform:scale(1.1); }
  }

  /* ---------- Rail content ---------- */
  .r-head{ display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
  .r-title{ font-family:'Jua',sans-serif; font-size:1.2rem; display:flex; align-items:center; gap:6px; margin-bottom:12px; }
  #rail-A .r-title{ color:var(--pink-d); } #rail-B .r-title{ color:var(--sun-d); }
  .ready-btn{ font-family:'Jua',sans-serif; padding:14px 0; width:100%; border-radius:16px; border:none; cursor:pointer;
              background:#dcd6e0; color:#6c6575; font-size:1.2rem; box-shadow:0 4px 0 #c3bcc9; transition:all .12s; margin-top:10px; }
  .ready-btn:active{ transform:translateY(2px); box-shadow:none; }
  .ready-btn.on{ background:#5fce6e; color:#fff; box-shadow:0 3px 0 #3da94c; }

  .words{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:8px; }
  .wbtn{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.05rem; color:#fff;
         padding:13px 17px; border-radius:15px; border:none; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.18); transition:transform .1s; }
  .wbtn:active{ transform:translateY(2px); }
  .wbtn:disabled{ opacity:.4; cursor:not-allowed; }
  .w-move{ background:#4b9bff; box-shadow:0 3px 0 #2f78d6; }
  .w-turn{ background:#43c98a; box-shadow:0 3px 0 #2da76d; }
  .w-num{ background:#fff; color:#3a3340; border:2px solid #e0d8ea; box-shadow:0 3px 0 #d4cadf; }
  .w-blk{ background:#b07cf0; box-shadow:0 3px 0 #8c57cf; }

  .sentence{ flex:1 1 auto; min-height:50px; background:rgba(255,255,255,.7); border:2px dashed #d8cfe0;
             border-radius:16px; padding:8px; display:flex; flex-wrap:wrap; align-content:flex-start; gap:6px; overflow:auto; }
  .sentence .ph{ color:#b3a9bd; font-size:.82rem; width:100%; text-align:center; align-self:center; }
  .chip{ display:inline-flex; align-items:center; gap:4px; height:fit-content; background:#fff; border:2px solid #ecd7e6;
         padding:4px 8px; border-radius:10px; font-family:'Fredoka',sans-serif; font-weight:600; font-size:.88rem;
         color:#4d4656; box-shadow:0 2px 3px rgba(0,0,0,.08); }
  .chip .x{ color:#ff7a9a; font-weight:700; cursor:pointer; line-height:1; }
  .clear-link{ font-family:'Fredoka',sans-serif; font-size:.72rem; color:#a99; background:none; border:none; cursor:pointer; align-self:flex-end; margin-bottom:4px; }
</style>
</head>
<body>
<div id="stage">

  <!-- ============ Player A (LEFT) ============ -->
  <div class="rail" id="rail-A">
    <div class="r-title">🎀 Buddy A <span class="kr" style="font-size:.78rem;color:#d56a93;">하츄핑</span></div>
    <div class="words">
      <button class="wbtn w-move" onclick="addWord('A','Go straight')">Go straight</button>
      <button class="wbtn w-turn" onclick="addWord('A','Turn left')">Turn left</button>
      <button class="wbtn w-turn" onclick="addWord('A','Turn right')">Turn right</button>
      <button class="wbtn w-num" onclick="addWord('A','1')">1</button>
      <button class="wbtn w-num" onclick="addWord('A','2')">2</button>
      <button class="wbtn w-num" onclick="addWord('A','3')">3</button>
      <button class="wbtn w-blk" onclick="addWord('A','block')">block</button>
      <button class="wbtn w-blk" onclick="addWord('A','blocks')">blocks</button>
    </div>
    <button class="clear-link" onclick="clearWords('A')">↺ Clear</button>
    <div class="sentence" id="sentence-A"></div>
    <button class="ready-btn" id="ready-A" onclick="toggleReady('A')">READY</button>
  </div>

  <!-- ============ Map (CENTER) ============ -->
  <div id="map-wrap">
    <div id="banner">
      <div class="big">Where is the <b id="b-name">Library</b>?
        <button id="btn-speak" onclick="speakCurrent()" title="다시 듣기">🔊</button></div>
      <div class="small kr"><span id="b-kr">Library</span> 어디에 있을까요?</div>
    </div>

    <div id="holder">
      <div class="board" id="board">
        <div id="roads"></div>
        <div id="scenery"></div>
        <div id="buildings"></div>
        <div id="pin">📍</div>
        <div class="char" id="char-A"><div class="arrow"></div>🎀</div>
        <div class="char" id="char-B"><div class="arrow"></div>🌼</div>
        <div id="toast"></div>
      </div>
    </div>

    <div id="hub">
      <div class="score"><span class="dot A"></span><span id="score-A">0</span></div>
      <div id="go-block">
        <div id="round-badge">ROUND 1</div>
        <button id="btn-go" onclick="playTurn()" disabled>GO!</button>
      </div>
      <div class="score"><span class="dot B"></span><span id="score-B">0</span></div>
      <div id="side-btns">
        <a href="game2.html" class="mini-btn" style="text-decoration: none; text-align: center; display: inline-block;">Catch the Suspect 게임 하러가기</a>
        <a href="game3.html" class="mini-btn" style="text-decoration: none; text-align: center; display: inline-block;">Give a Statement 게임 하러가기</a>
        <a href="typing.html" class="mini-btn" style="text-decoration: none; text-align: center; display: inline-block;">Typing Game하러가기</a>
        <button class="mini-btn" id="btn-next" onclick="nextRound()" style="display:none;">▶ Next</button>
        <button class="mini-btn" id="btn-reset" onclick="newGame()">⟳ Reset</button>
      </div>
    </div>
  </div>

  <!-- ============ Player B (RIGHT) ============ -->
  <div class="rail" id="rail-B">
    <div class="r-title">🌼 Buddy B <span class="kr" style="font-size:.78rem;color:#b89a3a;">조아핑</span></div>
    <div class="words">
      <button class="wbtn w-move" onclick="addWord('B','Go straight')">Go straight</button>
      <button class="wbtn w-turn" onclick="addWord('B','Turn left')">Turn left</button>
      <button class="wbtn w-turn" onclick="addWord('B','Turn right')">Turn right</button>
      <button class="wbtn w-num" onclick="addWord('B','1')">1</button>
      <button class="wbtn w-num" onclick="addWord('B','2')">2</button>
      <button class="wbtn w-num" onclick="addWord('B','3')">3</button>
      <button class="wbtn w-blk" onclick="addWord('B','block')">block</button>
      <button class="wbtn w-blk" onclick="addWord('B','blocks')">blocks</button>
    </div>
    <button class="clear-link" onclick="clearWords('B')">↺ Clear</button>
    <div class="sentence" id="sentence-B"></div>
    <button class="ready-btn" id="ready-B" onclick="toggleReady('B')">READY</button>
  </div>
</div>

<script>
/* ===================== Grid & Coordinates ===================== */
const COLS = [12, 30, 48, 66];   // % x  (columns 0~3)
const ROWS = [22, 50, 78];       // % y  (rows 0~2)
const cx = c => COLS[c];
const cy = r => ROWS[r];
const MAXC = 3, MAXR = 2;

const buildings = [
  { id:'restaurant', name:'Restaurant', c:0, r:0, ico:'🍔' },
  { id:'busstop',    name:'Bus stop',   c:1, r:0, ico:'🚏' },
  { id:'restroom',   name:'Restroom',   c:2, r:0, ico:'🚻' },
  { id:'park',       name:'Park',       c:0, r:1, ico:'⛲' },
  { id:'hospital',   name:'Hospital',   c:1, r:1, ico:'🏥' },
  { id:'bank',       name:'Bank',       c:2, r:1, ico:'🏦' },
  { id:'library',    name:'Library',    c:3, r:1, ico:'📚' },
  { id:'school',     name:'School',     c:1, r:2, ico:'🏫' },
  { id:'house',      name:'House',      c:3, r:2, ico:'🏠' },
];
const scenery = [
  {x:88,y:14,e:'🌳'},{x:94,y:40,e:'🌲'},{x:84,y:64,e:'🌳'},
  {x:6,y:90,e:'🌿'},{x:50,y:92,e:'🌳'},{x:92,y:88,e:'🌲'},{x:30,y:90,e:'🌿'},
];

/* ===================== State ===================== */
const players = {
  A:{ start:{c:0,r:2,dir:90},  c:0,r:2,dir:90,  words:[], ready:false, score:0 },  // left/bottom, facing right
  B:{ start:{c:3,r:0,dir:180}, c:3,r:0,dir:180, words:[], ready:false, score:0 },  // right/top, facing down
};
const TOTAL = buildings.length;   // 전체 문제 수 = 지도에 표시된 장소 수
let target = null, round = 1, playing = false, roundOver = false;
let queue = [];                   // 이번 게임의 출제 순서(장소를 섞어 중복 없이 출제)
const shuffle = a => { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };

/* ===================== Map build ===================== */
function buildMap(){
  const roads=document.getElementById('roads'); roads.innerHTML='';
  ROWS.forEach(y=>{ const d=document.createElement('div'); d.className='h-road'; d.style.top=`calc(${y}% - 13px)`; roads.appendChild(d); });
  COLS.forEach(x=>{ const d=document.createElement('div'); d.className='v-road'; d.style.left=`calc(${x}% - 13px)`; roads.appendChild(d); });

  const sc=document.getElementById('scenery'); sc.innerHTML='';
  scenery.forEach(s=>{ const e=document.createElement('div'); e.className='scenery'; e.style.left=s.x+'%'; e.style.top=s.y+'%'; e.style.fontSize='2.8rem'; e.textContent=s.e; sc.appendChild(e); });

  const bc=document.getElementById('buildings'); bc.innerHTML='';
  buildings.forEach(b=>{ const e=document.createElement('div'); e.className='building'; e.id='bld-'+b.id;
    e.style.left=cx(b.c)+'%'; e.style.top=cy(b.r)+'%';
    e.innerHTML=`<div class="ico">${b.ico}</div><div class="tag">${b.name}</div>`; bc.appendChild(e); });
}

/* ===================== Word handling ===================== */
function addWord(p,w){ if(playing||roundOver) return; players[p].words.push(w); renderSentence(p); }
function removeWord(p,i){ if(playing||roundOver) return; players[p].words.splice(i,1); renderSentence(p); }
function clearWords(p){ if(playing||roundOver) return; players[p].words=[]; renderSentence(p); }
function renderSentence(p){
  const box=document.getElementById('sentence-'+p); box.innerHTML='';
  if(!players[p].words.length){ box.innerHTML='<span class="ph kr">단어를 눌러<br>길을 안내해요…</span>'; return; }
  players[p].words.forEach((w,i)=>{ const s=document.createElement('span'); s.className='chip';
    s.innerHTML=`${w}<span class="x" onclick="removeWord('${p}',${i})">✕</span>`; box.appendChild(s); });
}

/* ===================== Ready / Go ===================== */
function toggleReady(p){ if(playing||roundOver) return; players[p].ready=!players[p].ready;
  document.getElementById('ready-'+p).classList.toggle('on', players[p].ready); refreshGo(); }
function refreshGo(){ const go=document.getElementById('btn-go');
  const ok=players.A.ready&&players.B.ready&&!playing&&!roundOver; go.disabled=!ok; go.classList.toggle('glow', ok); }

/* ===================== Positioning ===================== */
function place(p){ const s=players[p], el=document.getElementById('char-'+p);
  el.style.left=cx(s.c)+'%'; el.style.top=cy(s.r)+'%';
  el.style.transform=`translate(-50%,-50%) rotate(${s.dir}deg)`; }
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* 매 라운드 새 출발 위치 고르기 (목적지 칸 제외, 두 말판은 서로 다른 칸) */
function facing(cell){
  const dirs=[];
  if(cell.r>0) dirs.push(0);       // 위로 갈 수 있음
  if(cell.c<MAXC) dirs.push(90);   // 오른쪽
  if(cell.r<MAXR) dirs.push(180);  // 아래
  if(cell.c>0) dirs.push(270);     // 왼쪽
  return dirs[Math.floor(Math.random()*dirs.length)];
}
function pickStarts(t){
  const cells=[];
  for(let c=0;c<=MAXC;c++) for(let r=0;r<=MAXR;r++){
    if(c===t.c && r===t.r) continue;                 // 목적지에서는 출발 X
    cells.push({ c, r, d: Math.abs(c-t.c)+Math.abs(r-t.r) });  // d: 목적지까지 거리
  }
  // 목적지에서 멀리(가능하면 3칸 이상, 안 되면 2칸 이상) 떨어진 칸만 후보로
  let pool = cells.filter(x=>x.d>=3);
  if(pool.length<3) pool = cells.filter(x=>x.d>=2);
  if(pool.length<2) pool = cells.slice();            // 안전장치
  shuffle(pool);
  return { A:{...pool[0], dir:facing(pool[0])}, B:{...pool[1], dir:facing(pool[1])} };
}

/* ===================== Command parser ===================== */
function parse(words){
  const cmds=[];
  for(let i=0;i<words.length;i++){
    if(words[i]==='Go straight'){ let steps=1;
      if(i+1<words.length && !isNaN(parseInt(words[i+1]))){ steps=parseInt(words[i+1]); i++;
        if(i+1<words.length && (words[i+1]==='block'||words[i+1]==='blocks')) i++; }
      cmds.push({t:'move',v:steps}); }
    else if(words[i]==='Turn left'){ cmds.push({t:'turn',v:-90}); }
    else if(words[i]==='Turn right'){ cmds.push({t:'turn',v:90}); }
  }
  return cmds;
}

/* ===================== Run path ===================== */
async function run(p){
  const s=players[p], el=document.getElementById('char-'+p);
  for(const cmd of parse(s.words)){
    if(cmd.t==='turn'){ s.dir+=cmd.v; place(p); await sleep(450); }
    else{ for(let k=0;k<cmd.v;k++){
      let nc=s.c, nr=s.r, d=((s.dir%360)+360)%360;
      if(d===0) nr--; else if(d===90) nc++; else if(d===180) nr++; else if(d===270) nc--;
      if(nc<0||nc>MAXC||nr<0||nr>MAXR){
        el.style.transform=`translate(-50%,-50%) rotate(${s.dir}deg) scale(1.25)`; await sleep(220);
        place(p); await sleep(250); break; }
      s.c=nc; s.r=nr; place(p); await sleep(450);
    } }
  }
}

/* ===================== Turn & scoring ===================== */
async function playTurn(){
  if(playing) return;
  playing=true; roundOver=true;
  const go=document.getElementById('btn-go'); go.disabled=true; go.classList.remove('glow');
  document.querySelectorAll('.wbtn,.ready-btn').forEach(b=>b.disabled=true);

  await Promise.all([run('A'), run('B')]);

  const aWin=score('A'), bWin=score('B');
  if(aWin) players.A.score++;
  if(bWin) players.B.score++;
  document.getElementById('score-A').textContent=players.A.score+' / '+TOTAL;
  document.getElementById('score-B').textContent=players.B.score+' / '+TOTAL;

  let msg = aWin&&bWin ? '🎉 둘 다 정답!\nGreat job!' :
            aWin ? '🎀 Buddy A 정답!\nWell done!' :
            bWin ? '🌼 Buddy B 정답!\nWell done!' :
            '아쉬워요! 다시 도전 ✨\nTry again!';
  toast(msg);

  playing=false;
  if(round>=TOTAL){
    // 마지막 문제 → 최종 결과
    const res = players.A.score>players.B.score ? '🎀 Buddy A WIN! 🏆' :
                players.B.score>players.A.score ? '🌼 Buddy B WIN! 🏆' : '🤝 비겼어요! Draw!';
    setTimeout(()=>toast(res+'\n'+players.A.score+' : '+players.B.score), 1700);
    document.getElementById('btn-reset').classList.add('blink');
  } else {
    const next=document.getElementById('btn-next'); next.style.display='block'; next.classList.add('blink');
  }
}
function score(p){ const s=players[p], win=(s.c===target.c && s.r===target.r);
  if(win){ const el=document.getElementById('char-'+p); el.classList.add('pop'); setTimeout(()=>el.classList.remove('pop'),600); beep(true); }
  return win; }

/* ===================== Round flow ===================== */
function startRound(){
  playing=false; roundOver=false;
  document.getElementById('round-badge').textContent='Q '+round+' / '+TOTAL;
  const next=document.getElementById('btn-next'); next.style.display='none'; next.classList.remove('blink');
  document.querySelectorAll('.wbtn,.ready-btn').forEach(b=>b.disabled=false);

  const t = queue[round-1] || buildings[(round-1) % buildings.length];
  target=t;
  const starts = pickStarts(t);
  ['A','B'].forEach(p=>{ const s=players[p], st=starts[p];
    s.c=st.c; s.r=st.r; s.dir=st.dir;
    s.words=[]; s.ready=false; renderSentence(p); place(p);
    document.getElementById('ready-'+p).classList.remove('on'); });

  buildings.forEach(b=>document.getElementById('bld-'+b.id).classList.toggle('is-target', b.id===t.id));
  const pin=document.getElementById('pin'); pin.style.left=cx(t.c)+'%'; pin.style.top=cy(t.r)+'%'; pin.style.display='block';

  document.getElementById('b-name').textContent=t.name;
  document.getElementById('b-kr').textContent=t.name;
  toast('Where is the '+t.name+'?');
  speakCurrent();
  refreshGo();
}
function nextRound(){ round++; startRound(); }
function newGame(){ round=1; players.A.score=0; players.B.score=0;
  queue = shuffle(buildings.slice());
  document.getElementById('score-A').textContent='0 / '+TOTAL;
  document.getElementById('score-B').textContent='0 / '+TOTAL;
  document.getElementById('btn-reset').classList.remove('blink');
  target=null; startRound(); }

/* ===================== Toast & sound ===================== */
let toastTimer;
function toast(text){ const t=document.getElementById('toast'); t.textContent=text; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400); }
function beep(ok){ try{ const C=window.AudioContext||window.webkitAudioContext; if(!C) return;
  const ctx=new C(); const notes=ok?[660,880]:[200];
  notes.forEach((f,i)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=f; const t0=ctx.currentTime+i*0.14; g.gain.setValueAtTime(.18,t0);
    g.gain.exponentialRampToValueAtTime(.001,t0+.28); o.start(t0); o.stop(t0+.28); }); }catch(e){} }

/* ===================== Speech (원어민 음성으로 질문 읽어주기) ===================== */
let enVoice=null;
function pickVoice(){
  if(!('speechSynthesis' in window)) return;
  const vs=window.speechSynthesis.getVoices()||[]; if(!vs.length) return;
  const has=n=>vs.find(v=>v.name.toLowerCase().includes(n));
  enVoice =
    has('google us english') || has('google uk english') ||
    vs.find(v=>/natural/i.test(v.name) && /^en/i.test(v.lang)) ||   // Microsoft Natural 계열
    has('samantha') || has('aria') || has('jenny') || has('karen') || has('daniel') || has('alex') ||
    vs.find(v=>/en[-_]US/i.test(v.lang) && !/^Microsoft.*Desktop/i.test(v.name)) ||
    vs.find(v=>/^en/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ pickVoice(); window.speechSynthesis.onvoiceschanged=pickVoice; }

function speak(text){
  try{
    if(!('speechSynthesis' in window)) return;
    if(!enVoice) pickVoice();
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    if(enVoice){ u.voice=enVoice; u.lang=enVoice.lang; } else { u.lang='en-US'; }
    u.rate=0.9; u.pitch=1.0;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function speakCurrent(){ if(target) speak('Where is the '+target.name+'?'); }

/* ===================== Boot ===================== */
window.addEventListener('load',()=>{ buildMap(); newGame(); });
window.addEventListener('resize',()=>{ place('A'); place('B'); });
</script>
